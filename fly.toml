# fly.toml app configuration file generated for eloscloud-api on 2026-05-04T12:11:37-03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'eloscloud-api'
primary_region = 'gru'

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  NODE_ENV = "production"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    grace_period = "10s"
    interval = "15s"
    timeout = "2s"
    method = "GET"
    path = "/api/health"
    protocol = "http"

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
